name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'

jobs:
  ci:
    name: CI Gates (typecheck / lint / test / build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      - name: Test
        run: npm run test
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
